<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Validation</title>
    <style>
        :root {
            --bg: #08111f;
            --panel: #10233b;
            --panel-soft: #122942;
            --text: #eef4ff;
            --muted: #9fb3cc;
            --blue: #3b82f6;
            --green: #10b981;
            --orange: #f59e0b;
            --border: rgba(120, 162, 222, 0.22);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 28%),
                linear-gradient(180deg, #091321 0%, #08111f 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .page {
            width: min(1240px, calc(100vw - 8px));
            margin: 0 auto;
            padding: 10px 0 28px;
        }

        .panel, .toast {
            border: 1px solid var(--border);
            border-radius: 22px;
            background: rgba(11, 25, 43, 0.92);
            backdrop-filter: blur(14px);
        }

        .chip {
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(59,130,246,0.12);
            color: #bfdbfe;
            font-size: 14px;
            font-weight: 600;
        }

        .button {
            appearance: none;
            border: 0;
            border-radius: 8px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .button.primary { background: linear-gradient(135deg, #10b981, #059669); }
        .button.secondary { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .button.ghost {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .panel {
            padding: 16px;
        }

        .panel h2 {
            margin: 0 0 12px;
            font-size: 18px;
        }

        .feeds {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .feed {
            padding: 0;
            background: transparent;
            border: 0;
        }

        .feed-label {
            margin-bottom: 12px;
            padding: 0 2px;
            color: #bfd8f6;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        video, img {
            width: 100%;
            min-height: 380px;
            max-height: 620px;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 18px;
            background: #030812;
            border: 1px solid rgba(255,255,255,0.06);
            display: block;
        }

        .camera-stage {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 18px;
        }

        .camera-stage video {
            border-radius: 18px;
        }

        .scanner-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .overlay-block {
            position: absolute;
            background: rgba(0, 0, 0, 0.55);
        }

        .overlay-top {
            top: 0;
            left: 0;
            right: 0;
            height: 15%;
        }

        .overlay-bottom {
            left: 0;
            right: 0;
            bottom: 0;
            height: 13%;
        }

        .overlay-left {
            top: 15%;
            bottom: 13%;
            left: 0;
            width: 10%;
        }

        .overlay-right {
            top: 15%;
            bottom: 13%;
            right: 0;
            width: 10%;
        }

        .guide-oval {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 72%;
            border: 2px dashed #57e0ee;
            border-radius: 999px;
            box-shadow: 0 0 0 1px rgba(87, 224, 238, 0.16);
        }

        .scanner-window {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 72%;
            overflow: hidden;
            border-radius: 999px;
        }

        .scanner-line {
            position: absolute;
            left: 10px;
            right: 10px;
            top: 0;
            height: 3px;
            border-radius: 999px;
            background: #57e0ee;
            box-shadow: 0 0 18px rgba(87, 224, 238, 0.95);
            animation: scannerSweep 2.4s ease-in-out infinite alternate;
            will-change: top, opacity;
        }

        .camera-stage:not(.is-live) .scanner-line {
            animation-play-state: paused;
            opacity: 0.45;
        }

        @keyframes scannerSweep {
            0% { top: 0; opacity: 0.72; }
            50% { opacity: 1; }
            100% { top: calc(100% - 3px); opacity: 0.72; }
        }

        img[src=""] {
            visibility: hidden;
        }

        canvas { display: none; }

        .status {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(16, 185, 129, 0.08);
            color: #d6fae8;
            border: 1px solid rgba(16, 185, 129, 0.18);
            font-size: 14px;
            line-height: 1.5;
        }

        .actions {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .side-btn {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        .side-btn.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: transparent;
        }

        .report {
            margin-top: 16px;
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .card {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .card strong { display: block; margin-bottom: 6px; }
        .hint { color: var(--muted); font-size: 13px; }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%) translateY(24px);
            min-width: min(92vw, 520px);
            padding: 14px 16px;
            opacity: 0;
            pointer-events: none;
            transition: 180ms ease;
            z-index: 20;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.info { background: rgba(15, 118, 110, 0.96); }
        .toast.error { background: rgba(185, 28, 28, 0.96); }
        .toast.success { background: rgba(5, 150, 105, 0.96); }

        @media (max-width: 920px) {
            .page { width: min(100vw, calc(100vw - 4px)); padding: 6px 0 18px; }
            .panel { border-radius: 16px; }
            video, img {
                min-height: 470px;
                max-height: 76vh;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <div class="feeds">
                <div class="feed">
                    <div class="feed-label">Camera</div>
                    <div class="camera-stage" id="cameraStage">
                        <video id="webcamVideo" autoplay playsinline muted></video>
                        <div class="scanner-overlay">
                            <div class="overlay-block overlay-top"></div>
                            <div class="overlay-block overlay-bottom"></div>
                            <div class="overlay-block overlay-left"></div>
                            <div class="overlay-block overlay-right"></div>
                            <div class="guide-oval"></div>
                            <div class="scanner-window">
                                <div class="scanner-line"></div>
                            </div>
                        </div>
                    </div>
                    <canvas id="captureCanvas"></canvas>
                </div>
                <div class="feed">
                    <div class="feed-label">AI Annotated View</div>
                    <img id="annotatedImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="">
                </div>
            </div>
            <div class="status" id="statusBox">Preparing live validation…</div>
            <div class="report" id="improvementGrid"></div>
            <div class="actions">
                <button class="side-btn active" id="leftBtn" type="button">Left Ear</button>
                <button class="side-btn" id="rightBtn" type="button">Right Ear</button>
                <button class="side-btn" id="cameraFrontBtn" type="button">Front Cam</button>
                <button class="side-btn active" id="cameraBackBtn" type="button">Back Cam</button>
                <button class="button primary" id="retryBtn" type="button">Start Camera</button>
                <button class="button ghost" id="stopBtn" type="button">Stop Camera</button>
            </div>
        </section>
    </main>

    <div class="toast info" id="toast"></div>

    <script>
        const API_PORT = "8003";
        const EMPTY_FRAME = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";
        let cachedApiUrl = null;
        let sessionId = null;
        let currentEarSide = "left";
        let webcamStream = null;
        let isWebcamRunning = false;
        let autoDetectTimer = null;
        let isAutoProcessing = false;
        let currentCameraFacing = "environment";
        let lastAnnotatedAt = 0;
        let completionPostedFor = null;

        function isRunningInsideReactNativeWebView() {
            return !!window.ReactNativeWebView && typeof window.ReactNativeWebView.postMessage === "function";
        }

        function postLiveValidationMessage(type, payload) {
            if (!isRunningInsideReactNativeWebView()) {
                return;
            }

            window.ReactNativeWebView.postMessage(JSON.stringify({
                type,
                ...payload,
            }));
        }

        function isPerfectValidationResult(result) {
            const summaryAccuracy = Number(result?.summary?.overall_accuracy ?? result?.overall_accuracy ?? 0);
            const guidance = Array.isArray(result?.guidance) ? result.guidance : [];
            const allPointsCorrect = guidance.length > 0 && guidance.every(item => !!item && item.correct === true);

            return summaryAccuracy >= 99 || allPointsCorrect;
        }

        function getConfiguredApiUrl() {
            const params = new URLSearchParams(window.location.search);
            let explicitApiUrl = params.get("api");
            if (!explicitApiUrl) {
                try {
                    explicitApiUrl = window.localStorage.getItem("apiBaseUrl");
                } catch (_err) {}
            }
            return explicitApiUrl ? explicitApiUrl.replace(/\/+$/, "") : null;
        }

        function getApiCandidates() {
            const { protocol, hostname, origin, port } = window.location;
            const configuredApiUrl = getConfiguredApiUrl();
            const candidates = [];

            if (cachedApiUrl) candidates.push(cachedApiUrl);
            if (configuredApiUrl) candidates.push(configuredApiUrl);
            if ((protocol === "http:" || protocol === "https:") && hostname) {
                const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";
                if (!isLocalHost || !port || port === API_PORT || port === "80" || port === "443") {
                    candidates.push(origin);
                    candidates.push(`${protocol}//${hostname}:${API_PORT}`);
                } else {
                    candidates.push(`${protocol}//${hostname}:${API_PORT}`);
                    candidates.push(origin);
                }
            }

            const isAndroid = /Android/i.test(navigator.userAgent);
            candidates.push(isAndroid ? `http://10.0.2.2:${API_PORT}` : `http://localhost:${API_PORT}`);
            return [...new Set(candidates.filter(Boolean))];
        }

        function shouldRetryApiStatus(status) {
            return [404, 405, 421, 425, 426, 502, 503, 504].includes(status);
        }

        function joinApiUrl(baseUrl, path) {
            const normalizedPath = path.startsWith("/") ? path : `/${path}`;
            return `${baseUrl.replace(/\/+$/, "")}${normalizedPath}`;
        }

        async function apiFetch(path, options = {}) {
            const candidates = getApiCandidates();
            let lastError = null;
            let lastResponse = null;

            for (const baseUrl of candidates) {
                try {
                    const response = await fetch(joinApiUrl(baseUrl, path), options);
                    if (!shouldRetryApiStatus(response.status)) {
                        cachedApiUrl = baseUrl;
                        return response;
                    }
                    lastResponse = response;
                } catch (error) {
                    lastError = error;
                }
            }

            if (lastResponse) return lastResponse;
            throw lastError || new Error(`Unable to reach API. Tried: ${candidates.join(", ")}`);
        }

        function isMobileClient() {
            return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
        }

        function showToast(msg, type = "info") {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = `toast ${type}`;
            requestAnimationFrame(() => t.classList.add("show"));
            setTimeout(() => t.classList.remove("show"), 3200);
        }

        function setStatus(message) {
            document.getElementById("statusBox").textContent = message;
        }

        function setEarSide(side) {
            currentEarSide = side === "right" ? "right" : "left";
            document.getElementById("leftBtn").classList.toggle("active", currentEarSide === "left");
            document.getElementById("rightBtn").classList.toggle("active", currentEarSide === "right");
            document.getElementById("annotatedImg").src = EMPTY_FRAME;
            document.getElementById("improvementGrid").innerHTML = "";
        }

        function setCameraFacing(mode) {
            currentCameraFacing = ["user", "environment"].includes(mode) ? mode : "environment";
            document.getElementById("cameraFrontBtn").classList.toggle("active", currentCameraFacing === "user");
            document.getElementById("cameraBackBtn").classList.toggle("active", currentCameraFacing === "environment");
        }

        function startAutoDetectLoop() {
            stopAutoDetectLoop();
            autoDetectTimer = setInterval(autoDetectAndValidate, 100);
        }

        function stopAutoDetectLoop() {
            if (autoDetectTimer) {
                clearInterval(autoDetectTimer);
                autoDetectTimer = null;
            }
            isAutoProcessing = false;
        }

        function stopWebcam() {
            isWebcamRunning = false;
            stopAutoDetectLoop();
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
                webcamStream = null;
            }
            const video = document.getElementById("webcamVideo");
            const cameraStage = document.getElementById("cameraStage");
            if (video) video.srcObject = null;
            if (cameraStage) cameraStage.classList.remove("is-live");
            setStatus("Camera stopped. Tap Start Camera to continue.");
        }

        async function openWebcam() {
            if (!sessionId) {
                showToast("Session is missing.", "error");
                return;
            }

            try {
                stopWebcam();
                const candidates = [
                    { video: { width: 640, height: 480, facingMode: { exact: currentCameraFacing } } },
                    { video: { width: 640, height: 480, facingMode: { ideal: currentCameraFacing } } },
                    { video: { width: 640, height: 480 } },
                ];
                let stream = null;
                let lastError = null;

                for (const constraints of candidates) {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                        break;
                    } catch (err) {
                        lastError = err;
                    }
                }

                if (!stream) {
                    throw lastError || new Error("Unable to access camera");
                }

                webcamStream = stream;
                document.getElementById("webcamVideo").srcObject = stream;
                document.getElementById("cameraStage").classList.add("is-live");
                isWebcamRunning = true;
                startAutoDetectLoop();
                setStatus("Camera started. High-speed live validation is running.");
                showToast("Live validation started.", "success");
            } catch (err) {
                document.getElementById("cameraStage").classList.remove("is-live");
                setStatus("Camera could not start. Tap Start Camera and allow camera permission.");
                showToast(err && err.message ? err.message : "Unable to start camera", "error");
            }
        }

        function showImprovementReport(result) {
            document.getElementById("improvementGrid").innerHTML = result.guidance.map(item => {
                const errMm = item.error_cm != null ? `${(item.error_cm * 10).toFixed(1)} mm` : "Not found";
                return `
                    <div class="card">
                        <strong>Point ${item.point}</strong>
                        <div>${item.correct ? "Perfect" : errMm}</div>
                        <div class="hint">${item.message}</div>
                    </div>
                `;
            }).join("");
        }

        async function autoDetectAndValidate() {
            if (!isWebcamRunning || !sessionId || isAutoProcessing) return;

            const video = document.getElementById("webcamVideo");
            const canvas = document.getElementById("captureCanvas");
            if (!video || video.videoWidth === 0) return;

            const ctx = canvas.getContext("2d");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            let blob;
            try {
                blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.8));
            } catch (_err) {
                return;
            }

            if (!blob) return;

            isAutoProcessing = true;

            try {
                const valForm = new FormData();
                valForm.append("file", blob, "frame.jpg");
                valForm.append("session_id", sessionId);
                valForm.append("ear_side", currentEarSide);

                const resp = await apiFetch("/validate-frame", { method: "POST", body: valForm });
                if (!resp.ok) {
                    isAutoProcessing = false;
                    return;
                }

                const result = await resp.json();
                if (result.success && result.ear_detected) {
                    document.getElementById("annotatedImg").src = `data:image/png;base64,${result.annotated_image}`;
                    showImprovementReport(result);
                    lastAnnotatedAt = Date.now();
                    setStatus(`Scanning ${currentEarSide} ear. ${result.summary.status} result is live.`);

                    const completionKey = `${sessionId}:${currentEarSide}:${result?.summary?.overall_accuracy ?? 0}`;
                    if (
                        isRunningInsideReactNativeWebView() &&
                        isPerfectValidationResult(result) &&
                        completionPostedFor !== completionKey
                    ) {
                        completionPostedFor = completionKey;
                        stopWebcam();
                        setStatus(`Perfect Validation captured for ${currentEarSide} ear. Preparing next step...`);
                        setTimeout(() => {
                            postLiveValidationMessage("live_validation_complete", {
                                earSide: currentEarSide,
                                payload: {
                                    result,
                                    earSide: currentEarSide,
                                },
                            });
                        }, 700);
                        return;
                    }
                } else if (Date.now() - lastAnnotatedAt > 800) {
                    setStatus(`Scanning ${currentEarSide} ear. Bring the ear inside the scanner frame.`);
                }
            } catch (_err) {
                setStatus("Live validation is waiting for the next stable frame.");
            }

            setTimeout(() => {
                isAutoProcessing = false;
            }, 100);
        }

        async function restoreFromLaunchUrl() {
            const params = new URLSearchParams(window.location.search);
            const launchSessionId = params.get("session_id");
            if (!launchSessionId) {
                throw new Error("Session id is missing from the launch URL.");
            }

            const launchSide = (params.get("side") || "left").toLowerCase() === "right" ? "right" : "left";
            const resp = await apiFetch(`/session/${launchSessionId}`);
            if (!resp.ok) {
                throw new Error("Launch session not found");
            }

            sessionId = launchSessionId;
            setEarSide(launchSide);
        }

        async function boot() {
            try {
                await restoreFromLaunchUrl();
                setStatus("Session restored. Opening Back Camera…");
                setCameraFacing("environment");
                setTimeout(() => {
                    openWebcam().catch(() => null);
                }, 180);
            } catch (err) {
                setStatus("Unable to restore the requested live-validation session.");
                showToast(err && err.message ? err.message : "Unable to restore live session", "error");
            }
        }

        document.getElementById("leftBtn").addEventListener("click", () => setEarSide("left"));
        document.getElementById("rightBtn").addEventListener("click", () => setEarSide("right"));
        document.getElementById("cameraFrontBtn").addEventListener("click", () => {
            setCameraFacing("user");
            openWebcam().catch(() => null);
        });
        document.getElementById("cameraBackBtn").addEventListener("click", () => {
            setCameraFacing("environment");
            openWebcam().catch(() => null);
        });
        document.getElementById("retryBtn").addEventListener("click", () => {
            openWebcam().catch(() => null);
        });
        document.getElementById("stopBtn").addEventListener("click", stopWebcam);
        document.getElementById("annotatedImg").addEventListener("error", (event) => {
            event.currentTarget.src = EMPTY_FRAME;
        });

        window.addEventListener("beforeunload", stopWebcam);
        window.addEventListener("load", () => {
            boot().catch(() => null);
        });
    </script>
</body>
</html>
