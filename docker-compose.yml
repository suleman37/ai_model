services:
  ai-ear-unified-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-ear/unified-api:local
    pull_policy: never
    container_name: ai-ear-unified-api
    environment:
      PORT: 8000
      MODEL_PATH: /app/FASTAPI/best.pt
      PIXELS_PER_CM: 100
      IMAGE_SIZE: 256
      CONFIDENCE_THRESHOLD: 0.25
      MASK_THRESHOLD: 0.5
    healthcheck:
      test: ["CMD", "python", "/app/docker/healthcheck.py", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    init: true
    ports:
      - "8000:8000"
    restart: unless-stopped
    tmpfs:
      - /tmp
